<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2FAE76">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="낱말맞히기">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/icon-192.png">
<title>받침 낱말 맞히기</title>
<style>
  :root{
    --paper:#F3F7F4;
    --card:#FFFFFF;
    --ink:#233038;
    --ink-soft:#5C6B72;
    --line:#DEE7E2;
    --green:#2FAE76;
    --green-soft:#E4F5EC;
    --coral:#FF6B5B;
    --coral-soft:#FFEBE7;
    --sky:#3E9BFF;
    --sky-soft:#E7F1FF;
    --gold:#F5A623;
    --shadow:0 6px 20px rgba(35,48,56,.10);
    --shadow-lg:0 14px 40px rgba(35,48,56,.16);
    --radius:20px;
    --radius-sm:14px;
    --maxw:540px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#141B1E; --card:#1E282C; --ink:#EAF1ED; --ink-soft:#9FB0AC;
      --line:#2C3A3E; --green:#3FC489; --green-soft:#1C332A; --coral:#FF7D6E;
      --coral-soft:#3A2420; --sky:#6BB4FF; --sky-soft:#1B2C3E; --gold:#F7B94A;
      --shadow:0 6px 20px rgba(0,0,0,.35); --shadow-lg:0 14px 40px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="light"]{
    --paper:#F3F7F4; --card:#FFFFFF; --ink:#233038; --ink-soft:#5C6B72;
    --line:#DEE7E2; --green:#2FAE76; --green-soft:#E4F5EC; --coral:#FF6B5B;
    --coral-soft:#FFEBE7; --sky:#3E9BFF; --sky-soft:#E7F1FF; --gold:#F5A623;
    --shadow:0 6px 20px rgba(35,48,56,.10); --shadow-lg:0 14px 40px rgba(35,48,56,.16);
  }
  :root[data-theme="dark"]{
    --paper:#141B1E; --card:#1E282C; --ink:#EAF1ED; --ink-soft:#9FB0AC;
    --line:#2C3A3E; --green:#3FC489; --green-soft:#1C332A; --coral:#FF7D6E;
    --coral-soft:#3A2420; --sky:#6BB4FF; --sky-soft:#1B2C3E; --gold:#F7B94A;
    --shadow:0 6px 20px rgba(0,0,0,.35); --shadow-lg:0 14px 40px rgba(0,0,0,.5);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Apple SD Gothic Neo","Pretendard",system-ui,-apple-system,"Malgun Gothic",sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100dvh;
  }
  .wrap{
    max-width:var(--maxw); margin:0 auto;
    padding:16px 18px calc(24px + env(safe-area-inset-bottom));
    min-height:100dvh; display:flex; flex-direction:column;
  }
  button{font-family:inherit; cursor:pointer}
  .hidden{display:none !important}

  /* ---------- top bar ---------- */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:14px; min-height:40px}
  .topbar .title{font-weight:800; font-size:1.05rem; letter-spacing:-.02em}
  .topbar .spacer{flex:1}
  .iconbtn{
    border:none; background:var(--card); color:var(--ink); box-shadow:var(--shadow);
    width:40px; height:40px; border-radius:12px; font-size:1.1rem; display:grid; place-items:center;
    transition:transform .12s ease;
  }
  .iconbtn:active{transform:scale(.92)}

  /* ---------- home ---------- */
  .hero{text-align:center; padding:14px 6px 22px}
  .hero .kicker{color:var(--green); font-weight:800; letter-spacing:.14em; font-size:.72rem; text-transform:uppercase}
  .hero h1{margin:.35em 0 .15em; font-size:2rem; font-weight:900; letter-spacing:-.03em; text-wrap:balance; line-height:1.15}
  .hero p{margin:0; color:var(--ink-soft); font-size:.98rem}

  .modes{display:flex; flex-direction:column; gap:14px}
  .mode-card{
    text-align:left; border:none; border-radius:var(--radius); padding:20px 20px;
    background:var(--card); box-shadow:var(--shadow); color:var(--ink);
    display:flex; gap:16px; align-items:center; transition:transform .14s ease, box-shadow .14s ease;
    border:2px solid transparent;
  }
  .mode-card:active{transform:translateY(2px) scale(.995)}
  .mode-card:hover{box-shadow:var(--shadow-lg)}
  .mode-card .emoji{
    width:56px; height:56px; border-radius:16px; display:grid; place-items:center; font-size:1.7rem; flex:none;
  }
  .mode-card.choice .emoji{background:var(--sky-soft)}
  .mode-card.type .emoji{background:var(--green-soft)}
  .mode-card .mc-title{font-weight:800; font-size:1.18rem; letter-spacing:-.02em}
  .mode-card .mc-desc{color:var(--ink-soft); font-size:.9rem; margin-top:3px; line-height:1.4}
  .mode-card .mc-progress{color:var(--green); font-weight:800; font-size:.8rem; margin-top:6px}

  .home-foot{margin-top:auto; padding-top:22px; display:flex; flex-direction:column; gap:10px; align-items:center}
  .ghostbtn{
    border:1.5px solid var(--line); background:transparent; color:var(--ink-soft);
    padding:11px 18px; border-radius:12px; font-size:.9rem; font-weight:700;
  }
  .ghostbtn:active{transform:scale(.97)}

  /* ---------- quiz ---------- */
  .progress-row{display:flex; align-items:center; gap:12px; margin-bottom:16px}
  .pbar{flex:1; height:10px; background:var(--line); border-radius:99px; overflow:hidden}
  .pbar > span{display:block; height:100%; background:var(--green); border-radius:99px; width:0%; transition:width .35s ease}
  .pcount{font-size:.85rem; font-weight:800; color:var(--ink-soft); font-variant-numeric:tabular-nums}
  .score-pill{
    display:inline-flex; align-items:center; gap:5px; background:var(--card); box-shadow:var(--shadow);
    padding:6px 11px; border-radius:99px; font-weight:800; font-size:.85rem; font-variant-numeric:tabular-nums;
  }

  .card{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:24px 20px; display:flex; flex-direction:column; gap:18px;
  }
  .prompt-block{text-align:center}
  .prompt-label{color:var(--ink-soft); font-size:.85rem; font-weight:700; margin-bottom:8px}
  .phrase{
    font-size:2.3rem; font-weight:900; letter-spacing:-.02em; line-height:1.5;
    text-align:center; word-break:keep-all;
  }
  .phrase .ctx{ color:var(--ink); }
  .phrase .box{
    display:inline-grid; place-items:center; vertical-align:-.22em;
    width:auto; min-width:1.35em; height:1.5em; padding:0 .12em; margin:0 .06em;
    font-size:.95em; border-radius:.28em; border:2px dashed var(--line); color:var(--ink);
    background:transparent;
  }
  .ttsbtn{
    margin-top:12px; border:none; background:var(--sky-soft); color:var(--sky);
    padding:8px 16px; border-radius:99px; font-weight:800; font-size:.9rem; display:inline-flex; align-items:center; gap:6px;
  }
  .ttsbtn:active{transform:scale(.95)}

  /* answer boxes (hint) */
  .box{
    width:52px; height:58px; border-radius:14px; display:grid; place-items:center;
    font-size:1.8rem; font-weight:800; border:2px dashed var(--line); color:var(--ink);
    background:transparent; transition:all .18s ease;
  }
  .box.hint{border-style:solid; border-color:var(--sky); color:var(--sky); background:var(--sky-soft)}
  .box.revealed{border-style:solid; border-color:var(--green); color:var(--green); background:var(--green-soft)}
  .box.fixed{border-style:solid; border-color:var(--line); color:var(--ink-soft); background:transparent}

  .hint-note{
    text-align:center; font-size:.82rem; color:var(--ink-soft); min-height:1.1em;
  }
  .hint-note b{color:var(--coral)}

  /* subjective input */
  .type-input-row{display:flex; gap:10px}
  .type-input{
    flex:1; min-width:0; border:2px solid var(--line); background:var(--paper); color:var(--ink);
    border-radius:14px; padding:14px 16px; font-size:1.3rem; font-weight:700; text-align:center;
    outline:none; transition:border-color .15s ease;
  }
  .type-input:focus{border-color:var(--sky)}
  .type-input:disabled{opacity:.7}

  /* options */
  .options{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .opt{
    border:2px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:16px; padding:18px 10px; font-size:1.3rem; font-weight:800; letter-spacing:-.02em;
    transition:transform .1s ease, background .15s ease, border-color .15s ease, opacity .2s ease;
    min-height:64px;
  }
  .opt:active{transform:scale(.96)}
  .opt.correct{background:var(--green-soft); border-color:var(--green); color:var(--green)}
  .opt.wrong{background:var(--coral-soft); border-color:var(--coral); color:var(--coral); opacity:.55; text-decoration:line-through}
  .opt:disabled{cursor:default}
  .opt.removed{opacity:.32; text-decoration:line-through; pointer-events:none; filter:grayscale(.6)}

  /* action buttons */
  .actions{display:flex; gap:10px}
  .btn{
    flex:1; border:none; border-radius:16px; padding:16px; font-size:1.05rem; font-weight:800;
    transition:transform .1s ease, filter .15s ease; min-height:56px;
  }
  .btn:active{transform:translateY(2px)}
  .btn-primary{background:var(--green); color:#fff}
  .btn-sky{background:var(--sky); color:#fff}
  .btn-soft{background:var(--card); color:var(--ink-soft); box-shadow:var(--shadow)}
  .btn:disabled{opacity:.4; pointer-events:none}

  .feedback{text-align:center; font-weight:800; font-size:1.05rem; min-height:1.3em}
  .feedback.ok{color:var(--green)}
  .feedback.no{color:var(--coral)}

  /* shake / pop */
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  .shake{animation:shake .5s cubic-bezier(.36,.07,.19,.97)}
  @keyframes pop{0%{transform:scale(.9)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  .pop{animation:pop .3s ease}
  @media (prefers-reduced-motion: reduce){.shake,.pop{animation:none}}

  /* ---------- results ---------- */
  .result{text-align:center; padding:24px 12px}
  .result .big{font-size:4rem; line-height:1}
  .result h2{margin:.4em 0 .1em; font-size:1.6rem; font-weight:900}
  .result .stat{color:var(--ink-soft); font-size:1.05rem}
  .result .stat b{color:var(--green); font-size:1.3rem; font-variant-numeric:tabular-nums}

  /* ---------- edit ---------- */
  .edit-help{color:var(--ink-soft); font-size:.88rem; line-height:1.5; margin:0 0 12px}
  .edit-help code{background:var(--card); padding:1px 6px; border-radius:6px; font-size:.85em}
  textarea.editor{
    width:100%; min-height:300px; border:2px solid var(--line); border-radius:14px; background:var(--card);
    color:var(--ink); padding:14px; font-size:.95rem; line-height:1.6; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    outline:none; resize:vertical;
  }
  textarea.editor:focus{border-color:var(--sky)}
  .edit-msg{font-size:.85rem; font-weight:700; min-height:1.2em; margin:8px 2px}
  .edit-msg.ok{color:var(--green)} .edit-msg.no{color:var(--coral)}

  .footer-tag{text-align:center; color:var(--ink-soft); font-size:.72rem; margin-top:18px; opacity:.7}

  /* ---------- 끝말잇기 ---------- */
  .mode-card.chain .emoji{background:var(--coral-soft)}
  .mode-card.chosung .emoji{background:var(--sky-soft)}
  .chain-flow{display:flex; flex-wrap:wrap; gap:6px 4px; align-items:center; font-size:1.4rem; font-weight:800; line-height:1.5; min-height:2em}
  .chain-flow .cw{color:var(--ink-soft)}
  .chain-flow .cw.last{color:var(--green)}
  .chain-flow .arr{color:var(--line); font-weight:700}
  .chain-need{text-align:center; font-size:1.1rem; font-weight:800; color:var(--ink); margin:10px 0 16px; min-height:1.4em}
  .chain-endbox{text-align:center; padding:8px 0}
  .chain-endbox .big{font-size:1.9rem; font-weight:900; margin-bottom:4px}
  #chain-record{color:var(--gold); font-weight:800; margin-bottom:6px}
  /* 도우미 말풍선 */
  .assistant{display:flex; align-items:flex-start; gap:10px; margin-bottom:14px}
  .mascot{font-size:2.1rem; line-height:1.2; flex:none}
  .bubble{
    flex:1; min-height:1.4em; background:var(--sky-soft); color:var(--ink);
    border-radius:16px; border-top-left-radius:4px; padding:12px 15px;
    font-size:1.02rem; font-weight:800; line-height:1.45; transition:background .15s ease;
  }
  .bubble.ok{background:var(--green-soft); color:var(--green)}
  .bubble.no{background:var(--coral-soft); color:var(--coral)}
  .bubble.think{background:var(--sky-soft); color:var(--sky)}
  .register-ask{display:flex; gap:10px; margin-bottom:14px}
  .register-ask .btn{flex:1; min-height:52px; font-size:1rem}
  .chain-hint{text-align:center; font-size:1.35rem; font-weight:800; color:var(--sky); letter-spacing:.12em; min-height:1.4em; margin:2px 0}
  .chosung-pattern{text-align:center; font-size:2.8rem; font-weight:900; letter-spacing:.28em; color:var(--sky); margin:6px 0 2px}
  button.score-pill{border:none; cursor:pointer; color:var(--ink); font-family:inherit}
  button.score-pill:active{transform:scale(.94)}
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; padding:24px; z-index:50}
  .overlay-card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:22px 20px; width:100%; max-width:440px; max-height:80vh; overflow:auto; display:flex; flex-direction:column; gap:16px; text-align:center}
  .overlay-title{font-size:1.3rem; font-weight:900}
  .overlay .chain-flow{justify-content:center}

  /* 큰 화면(갤럭시 폴드 펼침 등): 세로 중앙 정렬 + 여유 폭 */
  @media (min-width:640px){
    :root{ --maxw:600px; }
    .wrap{ justify-content:center; padding-top:40px; padding-bottom:40px; }
    .hero{padding-top:0}
    .options{gap:14px}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ HOME ============ -->
  <section id="screen-home">
    <div class="topbar">
      <div class="title">📚 낱말 맞히기</div>
      <div class="spacer"></div>
      <button class="iconbtn" id="btn-fs" title="전체화면">⛶</button>
      <button class="iconbtn" id="btn-theme" title="화면 밝기">🌗</button>
    </div>

    <div class="hero">
      <div class="kicker">받침 있는 낱말</div>
      <h1>어떤 낱말일까요?</h1>
      <p>받침을 넣어 알맞은 낱말을 맞혀 보세요!</p>
    </div>

    <div class="modes">
      <button class="mode-card choice" data-mode="choice">
        <div class="emoji">✅</div>
        <div>
          <div class="mc-title">객관식 모드</div>
          <div class="mc-desc">네 개의 보기 중에서 정답 고르기 · 틀리면 오답이 하나씩 사라져요</div>
          <div class="mc-progress" id="prog-choice"></div>
        </div>
      </button>
      <button class="mode-card type" data-mode="type">
        <div class="emoji">✏️</div>
        <div>
          <div class="mc-title">주관식 모드</div>
          <div class="mc-desc">보기 없이 직접 입력하기 · 틀릴 때마다 자음→모음→받침 힌트가 늘어나요</div>
          <div class="mc-progress" id="prog-type"></div>
        </div>
      </button>
      <button class="mode-card chain" data-mode="chain">
        <div class="emoji">🔤</div>
        <div>
          <div class="mc-title">끝말잇기</div>
          <div class="mc-desc">낱말의 끝 글자로 새 낱말 잇기 · 최대한 길게 이어 보세요</div>
        </div>
      </button>
      <button class="mode-card chosung" data-mode="chosung">
        <div class="emoji">🔡</div>
        <div>
          <div class="mc-title">초성게임</div>
          <div class="mc-desc">초성만 보고 낱말 맞히기 · 사전에 있으면 정답!</div>
        </div>
      </button>
    </div>

    <div class="home-foot">
      <button class="ghostbtn" id="btn-edit">✎ 낱말 편집하기</button>
      <button class="ghostbtn" id="btn-reset-progress">↺ 진도 초기화</button>
      <button class="ghostbtn" id="btn-reset-chain">↺ 끝말잇기 기록 초기화</button>
    </div>
    <div class="footer-tag" id="word-count-tag"></div>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="screen-quiz" class="hidden">
    <div class="topbar">
      <button class="iconbtn" id="btn-home" title="홈으로">←</button>
      <div class="title" id="mode-title"></div>
      <div class="spacer"></div>
      <div class="score-pill">⭐ <span id="score-val">0</span></div>
    </div>

    <div class="progress-row">
      <div class="pbar"><span id="pbar-fill"></span></div>
      <div class="pcount"><span id="q-idx">1</span>/<span id="q-total">0</span></div>
    </div>

    <div class="card">
      <div class="prompt-block">
        <div class="prompt-label">빈칸에 알맞은 글자를 넣어요</div>
        <div class="phrase" id="phrase"></div>
        <div class="hint-note" id="hint-note"></div>
        <div>
          <button class="ttsbtn" id="btn-tts">🔊 읽어주기</button>
        </div>
      </div>

      <!-- subjective input -->
      <div id="type-area" class="hidden">
        <div class="type-input-row">
          <input class="type-input" id="type-input" type="text" inputmode="text"
                 autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="빈칸 글자 입력">
        </div>
      </div>

      <!-- objective options -->
      <div class="options hidden" id="options"></div>

      <div class="feedback" id="feedback"></div>

      <div class="actions">
        <button class="btn btn-soft" id="btn-hint">💡 힌트</button>
        <button class="btn btn-sky hidden" id="btn-submit">확인</button>
        <button class="btn btn-primary hidden" id="btn-next">다음 →</button>
        <button class="btn btn-soft" id="btn-skip">넘기기</button>
      </div>
    </div>
    <div class="footer-tag" id="answer-reveal"></div>
  </section>

  <!-- ============ RESULTS ============ -->
  <section id="screen-result" class="hidden">
    <div class="topbar">
      <button class="iconbtn" id="btn-home2" title="홈으로">←</button>
      <div class="title">결과</div>
    </div>
    <div class="card">
      <div class="result">
        <div class="big" id="result-emoji">🎉</div>
        <h2 id="result-title">참 잘했어요!</h2>
        <div class="stat">한 번에 맞힌 낱말 <b id="result-score">0</b> / <span id="result-total">0</span></div>
        <div class="stat" id="result-progress"></div>
      </div>
      <div class="actions">
        <button class="btn btn-soft" id="btn-result-home">홈으로</button>
        <button class="btn btn-primary" id="btn-retry">다음 7문제 →</button>
      </div>
    </div>
  </section>

  <!-- ============ EDIT ============ -->
  <section id="screen-edit" class="hidden">
    <div class="topbar">
      <button class="iconbtn" id="btn-edit-back" title="홈으로">←</button>
      <div class="title">낱말 편집</div>
    </div>
    <p class="edit-help">
      한 줄에 한 구절씩, 정답 글자를 대괄호 <code>[ ]</code>로 감싸요.<br>
      예: <code>물고기 [낚]시</code> · <code>급식을 먹[었]다</code> · <code>[볶]음밥</code>
    </p>
    <textarea class="editor" id="editor" spellcheck="false"></textarea>
    <div class="edit-msg" id="edit-msg"></div>
    <div class="actions">
      <button class="btn btn-soft" id="btn-reset">기본값 복원</button>
      <button class="btn btn-primary" id="btn-save">저장</button>
    </div>
  </section>

  <!-- ============ WORD CHAIN ============ -->
  <section id="screen-chain" class="hidden">
    <div class="topbar">
      <button class="iconbtn" id="btn-chain-home" title="홈으로">←</button>
      <div class="title">🔤 끝말잇기</div>
      <div class="spacer"></div>
      <button class="score-pill" id="chain-record-btn" title="최고 기록 보기">🔗 <span id="chain-count">0</span> · 최고 <span id="chain-best">0</span> 👀</button>
      <button class="iconbtn" id="chain-end-x" title="끝내기">✕</button>
    </div>
    <div class="card">
      <div class="assistant">
        <div class="mascot">🦉</div>
        <div class="bubble" id="chain-bubble"></div>
      </div>

function decompose(ch){
  const c = ch.charCodeAt(0) - 0xAC00;
  if(c < 0 || c > 11171) return null;
  return { cho:CHO[Math.floor(c/588)], jung:JUNG[Math.floor((c%588)/28)], jong:JONG[c%28] };
}
function compose(choStr, jungStr, jongStr){
  const ci=CHO.indexOf(choStr), ji=JUNG.indexOf(jungStr), ki=JONG.indexOf(jongStr||'');
  if(ci<0 || ji<0) return choStr;
  return String.fromCharCode(0xAC00 + ci*588 + ji*28 + (ki<0?0:ki));
}

}

  const m = s.match(/^([\s\S]*)\[([^\]]+)\]([\s\S]*)$/);
  if(!m) return null;
  const before = m[1], answer = m[2], after = m[3];
  if(!answer) return null;
  const beforeWord = before.split(/\s/).pop();   // 마지막 공백 뒤 조각
  const afterWord  = after.split(/\s/)[0];        // 첫 공백 앞 조각

}

function makeLetterDistractors(answerChar){
  const d = decompose(answerChar);
  if(!d) return shuffle(['가','나','다','라','마']).slice(0,3);
  const g1 = (JONG_CONF[d.jong] || GENERIC_JONG).map(j => compose(d.cho, d.jung, j)); // 받침(우선)
  const g2 = (CHO_CONF[d.cho] || []).map(c => compose(c, d.jung, d.jong));            // 초성
  const g3 = (JUNG_CONF[d.jung] || []).map(v => compose(d.cho, v, d.jong));           // 중성
  const ordered = [...shuffle(g1), ...shuffle(g2), ...shuffle(g3)];
  const out = [];
  const push = ch => { if(ch && ch !== answerChar && !out.includes(ch) && out.length < 3) out.push(ch); };
  ordered.forEach(push);
  // 부족분 보충: 목표 초/중성 + 일반 받침 → 그래도 부족하면 공통 글자
  GENERIC_JONG.map(j => compose(d.cho, d.jung, j)).forEach(push);
  ['가','나','다','라','마','바','사'].forEach(push);
  return out.slice(0, 3);
}

function pickRound(allTemplates, playedTemplates, size){
  const all = Array.from(new Set(allTemplates));
  const cap = Math.min(size, all.length);
  const playedSet = new Set(playedTemplates.filter(t => all.includes(t)));
  let reset = false;
  let unplayed = all.filter(t => !playedSet.has(t));
  if(all.length > 0 && unplayed.length === 0){
    reset = true; playedSet.clear(); unplayed = all.slice();
  }
  const round = [];
  for(const t of shuffle(unplayed)){ if(round.length >= cap) break; round.push(t); playedSet.add(t); }
  if(round.length < cap){
    for(const t of shuffle(all.filter(x => !round.includes(x)))){ if(round.length >= cap) break; round.push(t); }
  }

function chainCheck(prevWord, input, usedWords, dict){
  const v = norm(input);
  const np = norm(prevWord);
  const need = np ? [...np].pop() : '';
  if(!v) return { ok:false, reason:'empty', need };
  const chars = [...v];
  if(!chars.every(isHangulSyllable)) return { ok:false, reason:'notword', need };
  if(chars[0] !== need) return { ok:false, reason:'start', need };
  if(usedWords.some(w => norm(w) === v)) return { ok:false, reason:'reuse', need };
  if(dict && !dict.has(v)) return { ok:false, reason:'notindict', need };

}

function hintStages(word){

  [...word].forEach((ch,i)=>{
    const d = decompose(ch);
    if(!d){ out.push({ i, val:ch }); return; }
    out.push({ i, val:d.cho });
    out.push({ i, val:compose(d.cho, d.jung, '') });
    if(d.jong) out.push({ i, val:ch });
  });
  return out;
}
function hintDisplay(word, step){
  const stages = hintStages(word);
  const byChar = {};
  stages.slice(0, step).forEach(s=>{ byChar[s.i] = s.val; });
  return [...word].map((ch,i)=> byChar[i] !== undefined ? byChar[i] : '_').join('');
}

function hasContinuation(need, words, used){

  return words.some(w=>{ const v=norm(w); return v && [...v][0]===need && !u.has(v); });
}
function findHint(need, words, used){
  const u = new Set((used||[]).map(w=>norm(w)));
  const cands = words.filter(w=>{ const v=norm(w); return v && [...v][0]===need && !u.has(v); });
  return cands.length ? shuffle(cands)[0] : null;

function chosungOf(word){
  const chars = [...norm(word)];
  if(!chars.length) return null;
  let out = '';
  for(const ch of chars){ const d = decompose(ch); if(!d) return null; out += d.cho; }

}

function chosungHint(word, step){
  const chars = [...word];
  const stages = [];
  chars.forEach((ch,i)=>{
    const d = decompose(ch);
    if(!d) return;
    stages.push({ i, val: compose(d.cho, d.jung, '') });
    if(d.jong) stages.push({ i, val: ch });

const STORE_KEY_V1 = "nachmal.words.v1";
const STORE_KEY_V2 = "nachmal.words.v2";
const THEME_KEY = "nachmal.theme";

/* ================= 상태 ================= */
let WORDS = loadWords();
let state = null; // { mode, order, i, score, solvedFirstTry, hintLevel, done, options }

function loadWords(){
  try{
    const raw = localStorage.getItem(STORE_KEY_V2);
    if(raw){
      const arr = JSON.parse(raw);
      if(Array.isArray(arr) && arr.length){
        const w = arr.map(parseTemplate).filter(Boolean);
        if(w.length) return w;
      }
    }
  }catch(e){}
  try{
    const rawV1 = localStorage.getItem(STORE_KEY_V1);   // v1 → v2 마이그레이션
    if(rawV1){
      const arr = JSON.parse(rawV1);
      if(Array.isArray(arr) && arr.length){
        const w = arr
          .map(o => (o && o.prompt && o.answer) ? templateFromV1(o.prompt, o.answer) : null)
          .filter(Boolean).map(parseTemplate).filter(Boolean);
        if(w.length){ saveWords(w); return w; }
      }
    }
  }catch(e){}
  return DEFAULT_WORDS.slice();
}
function saveWords(words){
  try{ localStorage.setItem(STORE_KEY_V2, JSON.stringify(words.map(w=>w.template))); }catch(e){}
}
const PROGRESS_KEY = "nachmal.progress.v1";
const ROUND_SIZE = 7;
function loadProgress(){
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    if(raw){ const o = JSON.parse(raw); return { choice: Array.isArray(o.choice)?o.choice:[], type: Array.isArray(o.type)?o.type:[] }; }
  }catch(e){}
  return { choice: [], type: [] };
}
function saveProgress(){ try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(PROGRESS)); }catch(e){} }
let PROGRESS = loadProgress();
function totalProblems(){ return new Set(WORDS.map(w=>w.template)).size; }

/* ================= DOM ================= */
const $ = id => document.getElementById(id);
const screens = {
  home:$('screen-home'), quiz:$('screen-quiz'), result:$('screen-result'), edit:$('screen-edit'), chain:$('screen-chain'), chosung:$('screen-chosung')
};
function show(name){
  for(const k in screens) screens[k].classList.toggle('hidden', k!==name);
  if(name==='home') updateHomeProgress();
  window.scrollTo(0,0);
}

/* ---------- theme ---------- */
function initTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  if(saved) document.documentElement.setAttribute('data-theme', saved);
}
$('btn-theme').addEventListener('click', ()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  const isDark = cur ? cur==='dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
});

/* ---------- fullscreen ---------- */
function isFs(){ return document.fullscreenElement || document.webkitFullscreenElement; }
function lockPortrait(){
  try{
    if(screen.orientation && screen.orientation.lock){
      const p = screen.orientation.lock('portrait');
      if(p && p.catch) p.catch(()=>{});
    }
  }catch(e){}
}
function toggleFullscreen(){
  const el = document.documentElement;
  if(!isFs()){
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if(req){
      const p = req.call(el);
      if(p && p.then) p.then(lockPortrait).catch(()=>{});
      else lockPortrait();
    }
  }else{
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if(exit) exit.call(document);
  }
}
// 설치형(PWA)으로 실행 중이면 세로로 고정 시도
if(window.matchMedia('(display-mode: fullscreen)').matches || window.matchMedia('(display-mode: standalone)').matches){
  lockPortrait();
}
function syncFsIcon(){ $('btn-fs').textContent = isFs() ? '⛗' : '⛶'; }
$('btn-fs').addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', syncFsIcon);
document.addEventListener('webkitfullscreenchange', syncFsIcon);
// 설치형(PWA)으로 이미 전체화면이면 버튼 숨김
if(window.matchMedia('(display-mode: fullscreen)').matches || window.matchMedia('(display-mode: standalone)').matches){
  $('btn-fs').style.display = 'none';
}

/* ================= 유틸 ================= */

function speak(text){
  if(!('speechSynthesis' in window)) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ================= 퀴즈 시작 ================= */
function startQuiz(mode){
  const all = WORDS.map(w=>w.template);
  const { round, played } = pickRound(all, PROGRESS[mode] || [], ROUND_SIZE);
  PROGRESS[mode] = played; saveProgress();
  const idx = new Map(WORDS.map((w,i)=>[w.template, i]));
  const order = round.map(t => idx.get(t)).filter(i => i != null);
  state = {
    mode, order, i:0, score:0, hintLevel:0, done:false, options:[],
    coverageDone: played.length === totalProblems()
  };
  $('mode-title').textContent = mode==='choice' ? '객관식 모드' : '주관식 모드';
  $('q-total').textContent = state.order.length;
  $('type-area').classList.toggle('hidden', mode!=='type');
  $('options').classList.toggle('hidden', mode!=='choice');
  show('quiz');
  renderQuestion();
}

function currentWord(){ return WORDS[state.order[state.i]]; }

function renderQuestion(){
  state.hintLevel = 0;
  state.done = false;
  firstTryClean = true;

  // progress
  $('q-idx').textContent = state.i+1;
  $('score-val').textContent = state.score;
  $('pbar-fill').style.width = ((state.i)/state.order.length*100) + '%';

  // prompt
  $('feedback').textContent = ''; $('feedback').className = 'feedback';
  $('answer-reveal').textContent = '';
  $('hint-note').innerHTML = '';

  // boxes
  renderPhrase();

  // buttons
  $('btn-next').classList.add('hidden');
  $('btn-hint').classList.remove('hidden');
  $('btn-hint').disabled = false;
  $('btn-skip').classList.remove('hidden');

  if(state.mode==='type'){
    $('btn-submit').classList.remove('hidden');
    $('btn-submit').disabled = false;
    const inp = $('type-input');
    inp.value=''; inp.disabled=false;
    setTimeout(()=>inp.focus(), 60);
  }else{
    $('btn-submit').classList.add('hidden');
    renderOptions();
  }
}

function renderPhrase(){
  const w = currentWord();
  const cells = buildAnswerBoxes(w.answer, state.hintLevel);
  const p = $('phrase');
  p.innerHTML = '';
  if(w.before){ const s=document.createElement('span'); s.className='ctx'; s.textContent=w.before; p.appendChild(s); }
  cells.forEach(c=>{
    const el = document.createElement('span');
    el.className = 'box ' + (c.state==='hint'?'hint':c.state==='revealed'?'revealed':c.state==='fixed'?'fixed':'');
    el.textContent = c.text;
    p.appendChild(el);
  });
  if(w.after){ const s=document.createElement('span'); s.className='ctx'; s.textContent=w.after; p.appendChild(s); }
  $('hint-note').innerHTML = hintLabel(state.hintLevel);
}

/* ---------- 객관식 ---------- */
function renderOptions(){
  const w = currentWord();
  const opts = makeOptions(w.answer);
  state.options = opts;
  const box = $('options');
  box.innerHTML = '';
  opts.forEach(ans=>{
    const b = document.createElement('button');
    b.className = 'opt'; b.textContent = ans; b.dataset.ans = ans;
    b.addEventListener('click', ()=>chooseOption(b, ans));
    box.appendChild(b);
  });
}

function chooseOption(btn, ans){
  if(state.done) return;
  const w = currentWord();
  if(ans === w.answer){
    btn.classList.add('correct','pop');
    Array.from($('options').children).forEach(b=>b.disabled=true);
    onCorrect();
  }else{
    // 오답 하나 제거 + 힌트 단계 상승
    firstTryClean = false;
    btn.classList.add('wrong');
    btn.disabled = true;
    state.hintLevel++;
    renderPhrase();
    $('phrase').classList.remove('shake'); void $('phrase').offsetWidth; $('phrase').classList.add('shake');
    const remain = Array.from($('options').children).filter(b=>!b.disabled).length;
    setFeedback(false, remain>1 ? '아쉬워요! 오답 하나가 사라졌어요.' : '거의 다 왔어요!');
  }
}

/* ---------- 주관식 ---------- */
function submitTyped(){
  if(state.done) return;
  const w = currentWord();
  const val = norm($('type-input').value);
  if(!val) { $('type-input').focus(); return; }
  if(isCorrectTyped(val, w)){
    $('type-input').disabled = true;
    $('phrase').classList.add('pop');
    // 정답이면 전부 초록으로
    state.hintLevel = 99; renderPhrase(); $('hint-note').innerHTML='';
    onCorrect();
  }else{
    firstTryClean = false;
    state.hintLevel++;
    renderPhrase();
    $('phrase').classList.remove('shake'); void $('phrase').offsetWidth; $('phrase').classList.add('shake');
    setFeedback(false, '다시 한 번! 힌트가 늘어났어요.');
    $('type-input').select();
  }
}

/* ---------- 공통 ---------- */
function onCorrect(){
  state.done = true;
  // 힌트/오답 없이 첫 시도에 맞히면 +1점
  if(firstTryClean){ state.score++; }
  $('score-val').textContent = state.score;
  setFeedback(true, firstTryClean ? '정답! ⭐ 한 번에 맞혔어요!' : '정답이에요! 잘했어요 👏');
  $('answer-reveal').textContent = currentWord().full;
  $('btn-submit').classList.add('hidden');
  $('btn-hint').classList.add('hidden');
  $('btn-skip').classList.add('hidden');
  $('btn-next').classList.remove('hidden');
  $('pbar-fill').style.width = ((state.i+1)/state.order.length*100) + '%';
}

// firstTryClean: 이번 문제에서 아직 틀리거나 힌트를 쓰지 않았는가
let firstTryClean = true;

function setFeedback(ok, msg){
  const f = $('feedback');
  f.textContent = msg;
  f.className = 'feedback ' + (ok?'ok':'no');
}

function nextQuestion(){
  state.i++;
  if(state.i >= state.order.length){ showResult(); return; }
  firstTryClean = true;
  renderQuestion();
}

function useHint(){
  if(state.done) return;
  firstTryClean = false;
  state.hintLevel++;
  renderPhrase();
  if(state.hintLevel>=3){ $('btn-hint').disabled = true; setFeedback(false,'마지막 힌트예요!'); }
}

function skipQuestion(){
  if(state.done){ nextQuestion(); return; }
  firstTryClean = false;
  const w = currentWord();
  state.hintLevel = 99; renderPhrase(); $('hint-note').innerHTML='';
  if(state.mode==='choice'){
    Array.from($('options').children).forEach(b=>{
      b.disabled = true;
      if(b.dataset.ans===w.answer) b.classList.add('correct');
    });
  }else{
    $('type-input').value = w.answer; $('type-input').disabled = true;
    $('btn-submit').classList.add('hidden');
  }
  state.done = true;
  setFeedback(false, `정답은 "${w.answer}" 였어요.`);
  $('answer-reveal').textContent = w.full;
  $('btn-hint').classList.add('hidden');
  $('btn-skip').classList.add('hidden');
  $('btn-next').classList.remove('hidden');
}

  const total = state.order.length;

  $('result-total').textContent = total;
  $('result-score').textContent = score;
  const ratio = score/total;
  let emoji='🎉', title='참 잘했어요!';
  if(ratio===1){ emoji='🏆'; title='완벽해요! 최고!'; }
  else if(ratio>=0.7){ emoji='🎉'; title='아주 잘했어요!'; }
  else if(ratio>=0.4){ emoji='😊'; title='좋아요! 조금 더!'; }
  else { emoji='💪'; title='다시 도전해 볼까요?'; }
  $('result-emoji').textContent = emoji;
  $('result-title').textContent = title;
  const experienced = (PROGRESS[state.mode] || []).length;
  const totalWords = totalProblems();
  $('result-progress').textContent = `문제 경험 ${experienced}/${totalWords}`;
  if(state.coverageDone){
    $('result-emoji').textContent = '🏆';
    $('result-title').textContent = '모든 문제를 한 번씩 다 만났어요!';

}

function changeChainSeed(){
  if(chainWords.length !== 1) return;
  const cur = chainWords[0];
  const seeds = shuffle(SEED_WORDS);
  const seed = seeds.find(s => s !== cur && hasContinuation([...s].pop(), WORD_ALL, [s]))
            || seeds.find(s => s !== cur)

  chainWords = [ seed ];
  resetHint();
  hideRegisterAsk();

function showHint(){
  const need = chainWords.length ? [...chainWords[chainWords.length-1]].pop() : '';

  if(!hintWord){ say('think', `‘${need}’로 시작하는 낱말이 사전에 없어요. 아는 낱말을 등록해 주세요!`); return; }
  const total = hintStages(hintWord).length;
  hintStep = Math.min(hintStep + 1, total);
  $('chain-hint').textContent = '힌트: ' + hintDisplay(hintWord, hintStep);
  if(hintStep >= total) say('', '이 낱말이에요! 입력해 볼까요?');
}
function startChain(){
  finalizeBest();
  const seeds = shuffle(SEED_WORDS);

  chainWords = [ seed ];

function acceptWord(v, msg){

  const need = [...v].pop();
  if(!hasContinuation(need, WORD_ALL, chainWords)){
    say('think', `‘${need}’로 시작하는 낱말을 제가 잘 몰라요. 아는 낱말을 입력해 주세요!`);

function submitChain(){

  const prev = chainWords[chainWords.length-1];

// 초성 패턴별 낱말 색인 — 같은 초성으로 3개 이상 낱말이 있는 쉬운 패턴만 문제로 냄
let _choIdx = null, _choIdxLen = -1;
function chosungIndex(){
  if(_choIdx && _choIdxLen === WORD_ALL.length) return _choIdx;
  const map = new Map();
  for(const w of WORD_ALL){
    const n = [...w].length;
    if(n < 2 || n > 4) continue;         // 2~4글자 (초성 하나짜리 방지)
    const p = chosungOf(w);
    if(!p) continue;
    let arr = map.get(p);
    if(!arr){ arr = []; map.set(p, arr); }
    arr.push(w);
  }
  const easy = [];                        // 같은 초성 낱말 3개 이상인 패턴
  for(const [p, arr] of map){ if(arr.length >= 3) easy.push(p); }
  _choIdx = { map, easy };
  _choIdxLen = WORD_ALL.length;
  return _choIdx;
}
function newChosungProblem(){
  const idx = chosungIndex();
  if(idx.easy.length){
    // 직전 문제와 안 겹치게 (가능하면) 쉬운 패턴 하나 선택
    const cur = chosungPattern;
    let pattern = shuffle(idx.easy)[0];
    if(idx.easy.length > 1 && pattern === cur) pattern = shuffle(idx.easy.filter(p=>p!==cur))[0];
    chosungPattern = pattern;
    chosungWord = shuffle(idx.map.get(pattern))[0];   // 힌트용 대표 낱말
  }else{
    // 폴백: 3개 이상 패턴이 없으면 기존 방식(2~4글자 아무 낱말)
    const pool = WORD_ALL.filter(w=>{ const n=[...w].length; return n>=2 && n<=4; });
    chosungWord = shuffle(pool.length ? pool : WORD_ALL)[0];
    chosungPattern = chosungOf(chosungWord) || '';
  }
  chosungHintStep = 0;
  $('chosung-hint').textContent = '';
  $('chosung-input').value = '';
  choHideAsk();
  renderChosung();
}
function startChosung(){
  finalizeChoBest();
  chosungScore = 0;
  newChosungProblem();
  $('chosung-endbox').classList.add('hidden');
  $('chosung-play').classList.remove('hidden');
  $('chosung-record').classList.add('hidden');
  choSay('', '초성을 보고 낱말을 맞혀 볼까요?');
  show('chosung');
  setTimeout(()=>$('chosung-input').focus(), 60);
}
function chosungCorrect(msg){

function showChosungHint(){
  const total = [...chosungWord].reduce((n,ch)=>{ const d=decompose(ch); return n + (d ? 1 + (d.jong?1:0) : 0); }, 0);
  chosungHintStep = Math.min(chosungHintStep + 1, total);
  $('chosung-hint').textContent = '힌트: ' + chosungHint(chosungWord, chosungHintStep);
  if(chosungHintStep >= total) choSay('', '이런 낱말이에요! (다른 답도 정답이에요)');
}
function finalizeChoBest(){ if(chosungScore > chosungBest){ chosungBest = chosungScore; saveChoBest(chosungBest); return true; } return false; }
function endChosung(){
  const rec = finalizeChoBest();
  $('chosung-play').classList.add('hidden');
  $('chosung-endbox').classList.remove('hidden');
  $('chosung-endtext').textContent = `🔡 ${chosungScore}개 맞혔어요!`;
  $('chosung-record').classList.toggle('hidden', !rec);
  $('chosung-best').textContent = chosungBest;
  choSay('ok', '잘했어요! 또 해요 😊');
}
function leaveChosung(){ finalizeChoBest(); show('home'); }
